<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Borrar Contacto</title>
</head>
<body>

    <h1>Contactos</h1>
    <h2>borrar</h2>

    <form method="POST">
        <p>¿Seguro que quieres borrar este contacto?</p>

        <label>ID</label><br>
        <input type="text" name="id" value="1" readonly><br><br>

        <label>Nombre</label><br>
        <input type="text" value="Alvaro" readonly><br><br>

        <label>Primer Apellido</label><br>
        <input type="text" value="Díaz" readonly><br><br>

        <label>Segundo Apellido</label><br>
        <input type="text" value="Rodriguez" readonly><br><br>

        <label>Teléfono</label><br>
        <input type="text" value="123456" readonly><br><br>

        <label>Email</label><br>
        <input type="text" value="omk@.com" readonly><br><br>

        <button type="submit">Borrar</button>
        <a href="/contactos">Cancelar</a>
    </form>

</body>
</html>
