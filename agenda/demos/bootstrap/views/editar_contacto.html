<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Contacto</title>
</head>
<body>

    <h1>Contactos</h1>
    <h2>editar</h2>

    <form method="POST">
        <label>ID</label><br>
        <input type="text" value="1" readonly><br><br>

        <label>Nombre</label><br>
        <input type="text" name="nombre" value="Alvaro"><br><br>

        <label>Primer Apellido</label><br>
        <input type="text" name="primer_ap" value="Díaz"><br><br>

        <label>Segundo Apellido</label><br>
        <input type="text" name="segundo_ap" value="Rodriguez"><br><br>

        <label>Teléfono</label><br>
        <input type="text" name="telefono" value="123456"><br><br>

        <label>Email</label><br>
        <input type="text" name="email" value="omk@.com"><br><br>
        
        <button type="submit">Guardar</button>
        <a href="/contactos">Cancelar</a>
    </form>

</body>
</html>
